---
layout: default
---
<div class="blog-container">
  <h1 class="blog-title blog-animate">{{ page.title }}</h1>
  {% if page.date %}
    <span class="blog-meta blog-animate" style="animation-delay: 0.1s; opacity: 0;">{{ page.date | date: "%B %d, %Y" }}</span>
  {% endif %}
  <div class="blog-content blog-animate" style="animation-delay: 0.2s; opacity: 0;">
    {{ content }}
  </div>
</div>
