---
layout: default
---
<div class="blog-container">
  <h1 class="blog-title reveal-on-scroll">{{ page.title }}</h1>
  {% if page.date %}
    <span class="blog-meta reveal-on-scroll">{{ page.date | date: "%B %d, %Y" }}</span>
  {% endif %}
  <div class="blog-content reveal-on-scroll">
    {{ content }}
  </div>
</div>
